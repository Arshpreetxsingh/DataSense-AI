paths:
      raw_data : data/raw/
      processed_data: data/processed/
      model_dir: models/
    
model:
      test_size: 0.2
      random_state: 42

      models:
            logistic_regression: true
            random_forest: true
            xgboost: false

      hyperparameters:
        random_forest:
            n_estimators: 100
            max_depth: 10
        
        xgboost:
          n_estimators: 100
          learning_rate: 0.1

